<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Mi Diario del Mundial 2026</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 2rem; margin: 0 0 10px; color: var(--primary); }
        .stats-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .tabs { display: flex; gap: 8px; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active, .tab-btn:hover { background: var(--primary); color: var(--bg-main); border-color: var(--primary); }
        .counter-badge { font-size: 0.9rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 12px; }
        .partido-list { display: flex; flex-direction: column; gap: 12px; }
        .partido-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s, transform 0.2s; }
        .partido-card:hover { border-color: #475569; transform: translateY(-1px); }
        .partido-card.completado { border-left: 4px solid var(--success); }
        .card-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .team-container { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .team-row { display: flex; align-items: center; justify-content: space-between; font-size: 1.05rem; font-weight: 600; }
        .score-control { display: flex; align-items: center; gap: 6px; }
        .score-btn { background: rgba(255,255,255,0.08); border: none; color: var(--text-main); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .score-btn:hover { background: rgba(255,255,255,0.15); }
        .score-number { width: 24px; text-align: center; font-size: 1.1rem; color: var(--primary); }
        .action-area { display: flex; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .visto-btn { background: #334155; border: none; color: var(--text-main); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .visto-btn.visto { background: var(--success); }
        @media (max-width: 480px) { body { padding: 10px; } .stats-panel { flex-direction: column; align-items: stretch; } .tabs { justify-content: center; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏆 Mi Diario del Mundial</h1>
        <p style="color:var(--text-muted);margin:0;">Fase de Grupos · Mundial 2026</p>
    </header>
    <div class="stats-panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="filtrar('todos',this)">Todos</button>
            <button class="tab-btn" onclick="filtrar('pendientes',this)">Pendientes</button>
            <button class="tab-btn" onclick="filtrar('vistos',this)">Vistos</button>
        </div>
        <div class="counter-badge" id="progreso-texto">Cargando...</div>
    </div>
    <div class="partido-list" id="partidos-container"></div>
</div>
<script>
const STORAGE_KEY = 'mundial_2026_v1';
const DEFAULTS = [
    { id:1,  fecha:"11 Jun", grupo:"Grupo A", equipo1:"México 🇲🇽",          equipo2:"Sudáfrica 🇿🇦",    goles1:2, goles2:0, visto:true  },
    { id:2,  fecha:"11 Jun", grupo:"Grupo B", equipo1:"Corea del Sur 🇰🇷",   equipo2:"Chequia 🇨🇿",      goles1:2, goles2:1, visto:false },
    { id:3,  fecha:"12 Jun", grupo:"Grupo A", equipo1:"Canadá 🇨🇦",          equipo2:"Bosnia y Her. 🇧🇦", goles1:1, goles2:1, visto:true  },
    { id:4,  fecha:"12 Jun", grupo:"Grupo C", equipo1:"Estados Unidos 🇺🇸",  equipo2:"Paraguay 🇵🇾",     goles1:4, goles2:1, visto:false },
    { id:5,  fecha:"13 Jun", grupo:"Grupo C", equipo1:"Qatar 🇶🇦",           equipo2:"Suiza 🇨🇭",        goles1:1, goles2:1, visto:true  },
    { id:6,  fecha:"13 Jun", grupo:"Grupo D", equipo1:"Brasil 🇧🇷",          equipo2:"Marruecos 🇲🇦",    goles1:1, goles2:1, visto:true  },
    { id:7,  fecha:"13 Jun", grupo:"Grupo D", equipo1:"Haití 🇭🇹",           equipo2:"Escocia 🏴󠁧󠁢󠁳󠁣󠁴󠁿",    goles1:0, goles2:1, visto:true  },
    { id:8,  fecha:"13 Jun", grupo:"Grupo E", equipo1:"Australia 🇦🇺",       equipo2:"Turquía 🇹🇷",      goles1:2, goles2:0, visto:false },
    { id:9,  fecha:"14 Jun", grupo:"Grupo E", equipo1:"Alemania 🇩🇪",        equipo2:"Curazao 🇨🇼",      goles1:7, goles2:1, visto:true  },
    { id:10, fecha:"14 Jun", grupo:"Grupo F", equipo1:"Países Bajos 🇳🇱",    equipo2:"Japón 🇯🇵",        goles1:2, goles2:2, visto:true  },
    { id:11, fecha:"14 Jun", grupo:"Grupo F", equipo1:"Costa de Marfil 🇨🇮", equipo2:"Ecuador 🇪🇨",      goles1:1, goles2:0, visto:true  },
    { id:12, fecha:"14 Jun", grupo:"Grupo G", equipo1:"Suecia 🇸🇪",          equipo2:"Túnez 🇹🇳",        goles1:5, goles2:1, visto:false },
    { id:13, fecha:"15 Jun", grupo:"Grupo G", equipo1:"España 🇪🇸",          equipo2:"Cabo Verde 🇨🇻",   goles1:0, goles2:0, visto:true  }
];

function cargar() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { const d = JSON.parse(raw); if (Array.isArray(d) && d.length) return d; }
    } catch(e) {}
    return DEFAULTS.map(p => ({...p}));
}

let partidos = cargar();
let filtroActual = 'todos';

function guardar() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(partidos)); } catch(e) {}
    document.getElementById('progreso-texto').textContent =
        `Vistos: ${partidos.filter(p=>p.visto).length} de ${partidos.length}`;
}

function cambiarGoles(id, eq, delta) {
    const p = partidos.find(x => x.id === id);
    if (!p) return;
    if (eq === 1) p.goles1 = Math.max(0, p.goles1 + delta);
    else          p.goles2 = Math.max(0, p.goles2 + delta);
    guardar(); render();
}

function toggleVisto(id) {
    const p = partidos.find(x => x.id === id);
    if (!p) return;
    p.visto = !p.visto;
    guardar(); render();
}

function filtrar(tipo, btn) {
    filtroActual = tipo;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function render() {
    const container = document.getElementById('partidos-container');
    container.innerHTML = '';
    const lista = partidos.filter(p =>
        filtroActual === 'vistos'    ? p.visto :
        filtroActual === 'pendientes'? !p.visto : true
    );
    if (!lista.length) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">No hay partidos aquí.</p>';
        return;
    }
    lista.forEach(p => {
        const card = document.createElement('div');
        card.className = 'partido-card' + (p.visto ? ' completado' : '');
        card.innerHTML = `
            <div class="card-header"><span>📅 ${p.fecha}</span><span>${p.grupo}</span></div>
            <div class="team-container">
                <div class="team-row">
                    <span>${p.equipo1}</span>
                    <div class="score-control">
                        <button class="score-btn" onclick="cambiarGoles(${p.id},1,-1)">−</button>
                        <span class="score-number">${p.goles1}</span>
                        <button class="score-btn" onclick="cambiarGoles(${p.id},1,1)">+</button>
                    </div>
                </div>
                <div class="team-row">
                    <span>${p.equipo2}</span>
                    <div class="score-control">
                        <button class="score-btn" onclick="cambiarGoles(${p.id},2,-1)">−</button>
                        <span class="score-number">${p.goles2}</span>
                        <button class="score-btn" onclick="cambiarGoles(${p.id},2,1)">+</button>
                    </div>
                </div>
            </div>
            <div class="action-area">
                <button class="visto-btn ${p.visto?'visto':''}" onclick="toggleVisto(${p.id})">
                    ${p.visto ? '✓ Visto' : '👁️ Marcar visto'}
                </button>
            </div>`;
        container.appendChild(card);
    });
}

guardar(); render();
</script>
</body>
</html>
